[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Async support
asyncio_mode = auto

# Markers
markers =
    integration: Integration tests (may require running API)
    slow: Slow running tests
    unit: Unit tests

# Coverage
addopts =
    -v
    --tb=short
    --strict-markers

# Timeout
timeout = 300
